name: Sniff Visa Bulletin

on:
  workflow_dispatch:        # 手动触发
  schedule:
    # 探测间隔 = 每 30 分钟，仅在高概率 UTC 时段（覆盖美东 12:00–20:00，含夏/冬令时）。
    # 脚本再按美东时间精确门控（工作日 / 非假日 / 高概率日 / 高概率时段 / 命中即停）。
    - cron: '*/30 16-23 8-17 * *'   # 美东当日午后~晚（UTC 同日）
    - cron: '*/30 0 9-18 * *'       # 冬令时傍晚溢出到 UTC 次日 0 点

permissions:
  contents: write

# 让 checkout/setup-python 用 Node 24 运行，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sniff:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sniff for new visa bulletin
        run: python scripts/sniff_visa_bulletin.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/release_log.json index.html
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "无更新"
          else
            git commit -m "Auto: visa bulletin update $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # 仅在 sniff 真正更新了数据时才部署（避免空跑也挂上 github-pages 环境标记）
  deploy:
    needs: sniff
    if: needs.sniff.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # 取 sniff 刚 push 的最新提交
      - run: mkdir -p _site && cp index.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
