name: Sniff Visa Bulletin

on:
  workflow_dispatch:        # 手动触发
    inputs:
      force:
        description: '跳过时间门控，强制探测下一期一次（调试/首次运行用）'
        type: boolean
        default: false
      selftest:
        description: '抓取已发布的当前那期，校验解析器是否正确（不写文件/不开 PR）'
        type: boolean
        default: false
      backfill:
        description: '用 Wayback 拉历史释出日分布并打印推荐窗口/核心区（仅分析，不改文件）'
        type: boolean
        default: false
      drill:
        description: '演习：发一条测试 Bark 推送验证手机能收到（需先配 BARK_KEY）'
        type: boolean
        default: false
  schedule:
    # 覆盖美东 ~09:00–21:00（含上午盲区；含夏/冬令时）。脚本再按美东时间精确门控。
    # 注意：GitHub 定时任务不保证准点、高负载会延迟/丢弃，故时段放宽 + 多槽位以降低漏抓概率。
    - cron: '*/30 13-23 7-26 * *'   # 美东上午~晚（ET09–19 EDT ≈ UTC13–23）；覆盖安全窗 7–26 号
    - cron: '*/30 0-2 8-27 * *'     # 傍晚 ET 溢出到 UTC 次日 0–2 点（含冬令时）
    # 提速：核心日(10–17号) ET09–17（≈UTC13–21）补 :10/:20/:40/:50，与 */30 合成每 10 分钟。
    - cron: '10,20,40,50 13-21 10-17 * *'

# 命中后不再直接写 main，而是开 PR 待人工复核，避免误报数据自动上线/打包。
permissions:
  contents: write
  pull-requests: write

# 让 checkout/setup-python 用 Node 24 运行，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sniff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 模式：drill(演习推送) / backfill(回填历史) / selftest+force(调试) / 默认(定时探测)。
      - name: Sniff / selftest / backfill / drill
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.drill }}" = "true" ]; then
            python scripts/sniff_visa_bulletin.py --drill
          elif [ "${{ github.event_name == 'workflow_dispatch' && inputs.backfill }}" = "true" ]; then
            python scripts/backfill_release_dates.py
          else
            python scripts/sniff_visa_bulletin.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }} ${{ (github.event_name == 'workflow_dispatch' && inputs.selftest) && '--selftest' || '' }}
          fi

      # 数据若改动则开 PR；无改动时静默跳过（不建 PR）。
      # 合并 PR → push 到 main → 由 deploy-pages.yml 自动部署、package-offline.yml 自动重打包。
      - name: Open review PR if changed
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            data/release_log.json
            index.html
          branch: auto/visa-bulletin-update
          delete-branch: true
          commit-message: "Auto: visa bulletin update"
          title: "🔎 探测到新签证公告，待人工复核"
          body: |
            探测器检测到可能的新一期签证公告，已自动更新 `data/release_log.json` 与 `index.html`。

            ⚠️ **请先人工核对数据是否正确**（避免法律新闻误报、日期抓错）：
            - 看本 PR diff 里的 `fad`（表A）/`dff`（表B）日期是否与官方公告一致；
            - `data/release_log.json` 的 `note` 字段说明了命中来源。

            确认无误后合并到 `main` —— 网页会自动部署、离线包会自动重新打包并刷新下载链接。
            若是误报，直接关闭本 PR 即可，线上数据不受影响。
          labels: |
            visa-bulletin
            needs-review

      # 仅当"确实新建了复核 PR"时推送一次 Bark（避免合并前每次探测重复命中刷屏）。需配 BARK_KEY。
      # 通知正文 BARK_BODY 由上面的 sniff 步骤经 $GITHUB_ENV 传入（带具体日期+移动天数）。
      - name: Notify via Bark on new review PR
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python scripts/sniff_visa_bulletin.py --send-bark
