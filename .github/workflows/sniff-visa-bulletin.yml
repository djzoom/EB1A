name: Sniff Visa Bulletin

on:
  workflow_dispatch:        # 手动触发
    inputs:
      force:
        description: '跳过时间门控，强制探测一次（调试/首次运行用）'
        type: boolean
        default: false
  schedule:
    # 探测间隔 = 每 30 分钟，仅在高概率 UTC 时段（覆盖美东 12:00–20:00，含夏/冬令时）。
    # 脚本再按美东时间精确门控（工作日 / 非假日 / 高概率日 / 高概率时段 / 命中即停）。
    - cron: '*/30 16-23 8-17 * *'   # 美东当日午后~晚（UTC 同日）
    - cron: '*/30 0 9-18 * *'       # 冬令时傍晚溢出到 UTC 次日 0 点

# 命中后不再直接写 main，而是开 PR 待人工复核，避免误报数据自动上线/打包。
permissions:
  contents: write
  pull-requests: write

# 让 checkout/setup-python 用 Node 24 运行，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sniff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sniff for new visa bulletin
        run: python scripts/sniff_visa_bulletin.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      # 探测器若改动了数据，则开一个 PR；无改动时本步骤静默跳过（不建 PR）。
      # 合并 PR → push 到 main → 由 deploy-pages.yml 自动部署、package-offline.yml 自动重打包。
      - name: Open review PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            data/release_log.json
            index.html
          branch: auto/visa-bulletin-update
          delete-branch: true
          commit-message: "Auto: visa bulletin update"
          title: "🔎 探测到新签证公告，待人工复核"
          body: |
            探测器检测到可能的新一期签证公告，已自动更新 `data/release_log.json` 与 `index.html`。

            ⚠️ **请先人工核对数据是否正确**（避免法律新闻误报、日期抓错）：
            - 看本 PR diff 里的 `fad`（表A）/`dff`（表B）日期是否与官方公告一致；
            - `data/release_log.json` 的 `note` 字段说明了命中来源。

            确认无误后合并到 `main` —— 网页会自动部署、离线包会自动重新打包并刷新下载链接。
            若是误报，直接关闭本 PR 即可，线上数据不受影响。
          labels: |
            visa-bulletin
            needs-review
