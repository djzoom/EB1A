name: Check Data Updates

on:
  schedule:
    - cron: '0 12 * * *'  # 每天 noon UTC 巡检(HEAD 探测便宜+幂等);有新数据或漏抓才推 Bark,空跑静默
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  check-and-download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for new data
        id: check
        run: python scripts/check_data_updates.py

      - name: Commit and push if new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          if git diff --cached --quiet; then
            echo "No new data files"
          else
            git commit -m "Auto-update: new USCIS/DOS data $(date +%Y-%m-%d)"
            git push
          fi

      # 把 I-140 趋势 + f 估计写进运行摘要，便于每次复看"申请潮"走势与 f/排到区间
      - name: I-140 trend + f estimate (to run summary)
        if: always()
        run: |
          pip install openpyxl -q
          python scripts/i140_trend_report.py || true
          python scripts/estimate_f.py || true

      # 有新数据或逾期告警时推 Bark（正文由 check 步骤经 $GITHUB_ENV 传入）。需配 BARK_KEY。
      - name: Notify via Bark (new data / staleness)
        if: env.DATA_NOTIFY == '1'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python scripts/sniff_visa_bulletin.py --send-bark
